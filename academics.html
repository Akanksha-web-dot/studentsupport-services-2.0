<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academics Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

h2{text-align:center;}
</style>
</head>

<body>

<div class="overlay">

<h2>ACADEMICS (LIVE ADMIN DATA)</h2>

<!-- ATTENDANCE -->
<div class="card">
<h3>Attendance</h3>
<p id="att">Loading...</p>
</div>

<!-- SUBJECTS -->
<div class="card">
<h3>Subjects</h3>
<ul id="subjects"></ul>
</div>

<!-- TIMETABLE -->
<div class="card">
<h3>Timetable</h3>
<table border="1" width="100%" style="color:white;">
<tr><th>Day</th><th>Subject</th></tr>
<tbody id="tt"></tbody>
</table>
</div>

<!-- NOTICES -->
<div class="card">
<h3>Notices</h3>
<div id="notices"></div>
</div>

<!-- SUGGESTIONS (VIEW ONLY) -->
<div class="card">
<h3>Latest Suggestions</h3>
<div id="sug"></div>
</div>

</div>

<script>

function loadAll(){

    // ATTENDANCE
    document.getElementById("att").innerText =
    localStorage.getItem("attendance") || "No Data";

    // SUBJECTS
    let sub = JSON.parse(localStorage.getItem("subjects")) || [];
    document.getElementById("subjects").innerHTML =
    sub.map(x=>`<li>${x}</li>`).join("");

    // TIMETABLE
    let tt = JSON.parse(localStorage.getItem("timetable")) || {};
    let body = document.getElementById("tt");
    body.innerHTML="";

    for(let k in tt){
        body.innerHTML += `<tr><td>${k}</td><td>${tt[k]}</td></tr>`;
    }

    // NOTICES
    let n = JSON.parse(localStorage.getItem("notices")) || [];
    document.getElementById("notices").innerHTML =
    n.length ? n.map(x=>`<div class="card">${x}</div>`).join("")
             : "<p>No notices</p>";

    // SUGGESTIONS
    let s = JSON.parse(localStorage.getItem("suggestions")) || [];
    document.getElementById("sug").innerHTML =
    s.length ? s.map(x=>`<div class="card">${x}</div>`).join("")
             : "<p>No suggestions</p>";
}

// LIVE UPDATE (real-time feel)
setInterval(loadAll,2000);

loadAll();

</script>

</body>
</html>
