<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academics (Live Data)</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

h2{text-align:center;}
</style>
</head>

<body>

<div class="overlay">

<h2>ACADEMICS (LIVE FROM ADMIN)</h2>

<!-- ATTENDANCE -->
<div class="card">
<h3>Attendance</h3>
<p id="att">Loading...</p>
</div>

<!-- SUBJECTS -->
<div class="card">
<h3>Subjects</h3>
<ul id="subjects"></ul>
</div>

<!-- TIMETABLE -->
<div class="card">
<h3>Timetable</h3>
<table border="1" width="100%" style="color:white;">
<tr><th>Day</th><th>Subject</th></tr>
<tbody id="ttable"></tbody>
</table>
</div>

<!-- SUGGESTIONS (optional view only) -->
<div class="card">
<h3>Latest Updates</h3>
<div id="updates"></div>
</div>

</div>

<script>

// ================= AUTO REFRESH FUNCTION =================
function loadData(){

    // ATTENDANCE
    document.getElementById("att").innerText =
    localStorage.getItem("attendance") || "No Data";

    // SUBJECTS
    let subs = JSON.parse(localStorage.getItem("subjects")) || [];
    document.getElementById("subjects").innerHTML =
    subs.map(s=>`<li>${s}</li>`).join("");

    // TIMETABLE
    let tt = JSON.parse(localStorage.getItem("timetable")) || {};
    let body = document.getElementById("ttable");

    body.innerHTML="";
    for(let d in tt){
        body.innerHTML += `<tr><td>${d}</td><td>${tt[d]}</td></tr>`;
    }

    // SUGGESTIONS (VIEW ONLY)
    let sug = JSON.parse(localStorage.getItem("suggestions")) || [];
    document.getElementById("updates").innerHTML =
    sug.map(x=>`<div class="card">${x}</div>`).join("");
}

// 🔄 AUTO REFRESH EVERY 2 SECONDS (LIVE UPDATE)
setInterval(loadData, 2000);

loadData();

</script>

</body>
</html>
