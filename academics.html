<!DOCTYPE html>
<html>
<head>
  <title>Academics</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      background: rgba(0,0,0,0.78);
      min-height: 100vh;
      padding: 20px;
    }

    h2 { text-align: center; }

    .academics {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      width: 30%;
      border-radius: 12px;
      box-shadow: 2px 2px 10px #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    th, td {
      padding: 8px;
      text-align: center;
    }

    th {
      background: #007bff;
    }

    tr:nth-child(even) {
      background: rgba(255,255,255,0.1);
    }

    .center { text-align: center; }
  </style>

</head>
<body>

<div class="overlay">

<h2>Academics Module</h2>

<div class="academics">

  <div class="card">
    <h3>Subjects</h3>
    <ul id="subjectsList"></ul>
  </div>

  <div class="card">
    <h3>Attendance</h3>
    <h1 id="attendance" class="center"></h1>
  </div>

  <div class="card">
    <h3>Timetable</h3>
    <table id="timetableTable">
      <tr><th>Day</th><th>Subjects</th></tr>
    </table>
  </div>

</div>

<!-- 💬 SUGGESTION BOX -->
<div class="card center" style="width:50%; margin:30px auto;">
  <h3>Suggestion Box</h3>
  <textarea id="suggestionText" placeholder="Enter your suggestion..." style="width:90%; height:80px;"></textarea><br><br>
  <button onclick="submitSuggestion()">Submit</button>
</div>

<div class="center">
  <button onclick="goBack()">Back to Dashboard</button>
</div>

</div>

<script>
// 🔐 LOGIN CHECK
if(!sessionStorage.getItem("loggedIn")){
  window.location.href="login.html";
}

// SUBJECTS
let subs = JSON.parse(localStorage.getItem("subjects")) || [];
let ul = document.getElementById("subjectsList");

if(subs.length){
  subs.forEach(s=>{
    let li=document.createElement("li");
    li.innerText=s;
    ul.appendChild(li);
  });
}else{
  ul.innerHTML="<li>No Subjects Available</li>";
}

// ATTENDANCE
let att = localStorage.getItem("attendance");
document.getElementById("attendance").innerText = att ? att+"%" : "No Data";

// TIMETABLE
let tt = JSON.parse(localStorage.getItem("timetable")) || {};
let table = document.getElementById("timetableTable");

if(Object.keys(tt).length){
  for(let d in tt){
    let tr=document.createElement("tr");
    tr.innerHTML=`<td>${d}</td><td>${tt[d]}</td>`;
    table.appendChild(tr);
  }
}else{
  let tr=document.createElement("tr");
  tr.innerHTML="<td colspan='2'>No Timetable Available</td>";
  table.appendChild(tr);
}

// 💬 SUBMIT SUGGESTION
function submitSuggestion(){
  let text = document.getElementById("suggestionText").value;

  if(text.trim()===""){
    alert("Enter something");
    return;
  }

  let arr = JSON.parse(localStorage.getItem("suggestions")) || [];
  arr.push(text);

  localStorage.setItem("suggestions", JSON.stringify(arr));

  alert("Suggestion Submitted");
  document.getElementById("suggestionText").value="";
}

// BACK
function goBack(){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
