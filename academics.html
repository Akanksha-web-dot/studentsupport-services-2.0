<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academics</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

textarea{
    width:95%;
    padding:8px;
}
</style>
</head>

<body>

<div class="overlay">

<h2>ACADEMICS</h2>

<!-- NOTICES -->
<div class="card">
<h3>Notices</h3>
<div id="notices"></div>
</div>

<!-- SUGGESTION BOX -->
<div class="card">
<h3>Send Suggestion</h3>
<textarea id="sug"></textarea>
<button onclick="sendSug()">Submit</button>
</div>

</div>

<script>

/// LOAD NOTICES FROM ADMIN
function loadNotices(){
    let n=JSON.parse(localStorage.getItem("notices"))||[];
    document.getElementById("notices").innerHTML =
    n.length ? n.map(x=>`<div class="card">${x}</div>`).join("")
             : "<p>No notices</p>";
}

/// SEND SUGGESTION TO ADMIN
function sendSug(){
    let s=document.getElementById("sug").value;

    let arr=JSON.parse(localStorage.getItem("suggestions"))||[];
    arr.push(s);

    localStorage.setItem("suggestions",JSON.stringify(arr));

    document.getElementById("sug").value="";
}

setInterval(loadNotices,2000);
loadNotices();

</script>

</body>
</html>
