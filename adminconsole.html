<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Console</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.85);
    min-height: 100vh;
    padding: 20px;
}

h2 {
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.12);
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}

button {
    padding: 8px;
    margin-top: 5px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

.topbtn {
    background: #2c7be5;
    margin: 10px;
}
</style>
</head>

<body>

<script>
// 🔐 LOGIN CHECK
if(!sessionStorage.getItem("loggedIn")){
  window.location.href="login.html";
}
</script>

<div class="overlay">

<h2>ADMIN CONSOLE</h2>

<div style="text-align:center;">
<button class="topbtn" onclick="logout()">Logout</button>
<button class="topbtn" onclick="location.href='dashboard.html'">Dashboard</button>
</div>

<!-- 📊 SUMMARY SECTION -->
<div class="card">
<h3>Academic Data Summary</h3>

<p id="attData"></p>
<p id="subjectCount"></p>
<p id="suggestionCount"></p>
</div>

<!-- 📚 SUBJECTS -->
<div class="card">
<h3>Subjects List</h3>
<ul id="subjectsList"></ul>
</div>

<!-- 📅 TIMETABLE -->
<div class="card">
<h3>Timetable</h3>
<table border="1" width="100%" style="color:white;">
<tr><th>Day</th><th>Subjects</th></tr>
<tbody id="timetableTable"></tbody>
</table>
</div>

<!-- 💬 SUGGESTIONS -->
<div class="card">
<h3>Student Suggestions</h3>
<div id="suggestionsBox"></div>
</div>

</div>

<script>

// 📊 ATTENDANCE
let att = localStorage.getItem("attendance");
document.getElementById("attData").innerText =
"Attendance: " + (att ? att + "%" : "No Data");

// 📚 SUBJECTS
let subs = JSON.parse(localStorage.getItem("subjects")) || [];
document.getElementById("subjectCount").innerText =
"Total Subjects: " + subs.length;

let ul = document.getElementById("subjectsList");

if(subs.length){
    subs.forEach(s=>{
        let li=document.createElement("li");
        li.innerText=s;
        ul.appendChild(li);
    });
}else{
    ul.innerHTML="<li>No Subjects</li>";
}

// 📅 TIMETABLE
let tt = JSON.parse(localStorage.getItem("timetable")) || {};
let tbody = document.getElementById("timetableTable");

if(Object.keys(tt).length){
    for(let d in tt){
        let tr=document.createElement("tr");
        tr.innerHTML=`<td>${d}</td><td>${tt[d]}</td>`;
        tbody.appendChild(tr);
    }
}else{
    tbody.innerHTML="<tr><td colspan='2'>No Data</td></tr>";
}

// 💬 SUGGESTIONS (FROM ACADEMICS)
let suggestions = JSON.parse(localStorage.getItem("suggestions")) || [];

document.getElementById("suggestionCount").innerText =
"Total Suggestions: " + suggestions.length;

let box = document.getElementById("suggestionsBox");

if(suggestions.length){
    suggestions.forEach((s,i)=>{
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <p><b>${i+1}. </b>${s}</p>
            <button onclick="deleteSuggestion(${i})">Delete</button>
        `;

        box.appendChild(div);
    });
}else{
    box.innerHTML="<p>No Suggestions</p>";
}

// ❌ DELETE SUGGESTION
function deleteSuggestion(i){
    let data = JSON.parse(localStorage.getItem("suggestions")) || [];
    data.splice(i,1);
    localStorage.setItem("suggestions", JSON.stringify(data));
    location.reload();
}

// 🚪 LOGOUT
function logout(){
    sessionStorage.removeItem("loggedIn");
    window.location.href="login.html";
}

</script>

</body>
</html>
