<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Console</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.box{
    width:300px;
    margin:120px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
}

button{
    padding:10px;
    width:95%;
    background:#2c7be5;
    color:white;
    border:none;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginBox" class="box">
<h2>Admin Login</h2>

<input type="text" id="id" placeholder="Admin ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="err" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel" class="overlay" style="display:none;">

<h2>ADMIN PANEL</h2>

<div class="card">
<h3>Attendance</h3>
<input type="number" id="att">
<button onclick="saveAtt()">Save</button>
</div>

<div class="card">
<h3>Subjects</h3>
<input type="text" id="sub">
<button onclick="addSub()">Add</button>
</div>

<div class="card">
<h3>Timetable</h3>
<input type="text" id="day">
<input type="text" id="t">
<button onclick="addTT()">Add</button>
</div>

<div class="card">
<button onclick="goBack()">Back to Academics</button>
</div>

</div>

<script>

/// ALWAYS FRESH LOGIN (NO SESSION STORAGE)
function login(){
    let id=document.getElementById("id").value;
    let pass=document.getElementById("pass").value;

    if(id==="admin@alliance.edu.in" && pass!==""){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="block";
    } else {
        document.getElementById("err").innerText="Invalid Login";
    }
}

/// DATA SHARED WITH ACADEMICS
function saveAtt(){
    localStorage.setItem("attendance",document.getElementById("att").value);
}

function addSub(){
    let s=document.getElementById("sub").value;
    let arr=JSON.parse(localStorage.getItem("subjects"))||[];
    arr.push(s);
    localStorage.setItem("subjects",JSON.stringify(arr));
}

function addTT(){
    let d=document.getElementById("day").value;
    let t=document.getElementById("t").value;

    let tt=JSON.parse(localStorage.getItem("timetable"))||{};
    tt[d]=t;

    localStorage.setItem("timetable",JSON.stringify(tt));
}

/// 🔥 BACK → ALWAYS RELOADS LOGIN NEXT TIME
function goBack(){
    window.location.href="academics.html";
}

</script>

</body>
</html>
