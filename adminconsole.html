<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academics - Live</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

h2{text-align:center;}
</style>
</head>

<body>

<div class="overlay">

<h2>ACADEMICS (LIVE DATA FROM ADMIN)</h2>

<div class="card">
<h3>Attendance</h3>
<p id="att">Loading...</p>
</div>

<div class="card">
<h3>Subjects</h3>
<ul id="subs"></ul>
</div>

<div class="card">
<h3>Timetable</h3>
<table border="1" width="100%" style="color:white;">
<tr><th>Day</th><th>Subject</th></tr>
<tbody id="tt"></tbody>
</table>
</div>

<div class="card">
<h3>Latest Updates</h3>
<div id="sug"></div>
</div>

</div>

<script>

function loadData(){

    // Attendance
    document.getElementById("att").innerText =
    localStorage.getItem("attendance") || "No Data";

    // Subjects
    let s = JSON.parse(localStorage.getItem("subjects")) || [];
    document.getElementById("subs").innerHTML =
    s.map(x=>`<li>${x}</li>`).join("");

    // Timetable
    let t = JSON.parse(localStorage.getItem("timetable")) || {};
    let body = document.getElementById("tt");
    body.innerHTML="";

    for(let k in t){
        body.innerHTML += `<tr><td>${k}</td><td>${t[k]}</td></tr>`;
    }

    // Suggestions
    let sug = JSON.parse(localStorage.getItem("suggestions")) || [];
    document.getElementById("sug").innerHTML =
    sug.map(x=>`<div class="card">${x}</div>`).join("");
}

// 🔄 LIVE REFRESH (auto update from admin)
setInterval(loadData, 2000);

loadData();

</script>

</body>
</html>
