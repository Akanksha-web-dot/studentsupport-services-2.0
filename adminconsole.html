<!DOCTYPE html>
<html>
<head>
<title>Admin Console</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* LOGIN */
#loginBox {
    text-align: center;
    margin-top: 100px;
}

/* ADMIN PANEL */
#adminPanel {
    display: none;
    padding: 20px;
}

.box {
    background: white;
    padding: 15px;
    margin: 15px auto;
    width: 50%;
    border-radius: 10px;
    box-shadow: 2px 2px 10px #ccc;
}

h2 {
    text-align: center;
}

button {
    margin-top: 10px;
}
</style>

</head>

<body>

<!-- 🔐 ADMIN LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="adminUser" placeholder="Username"><br><br>
  <input id="adminPass" type="password" placeholder="Password"><br><br>
  <button onclick="adminLogin()">Login</button>
</div>

<!-- 🧑‍💼 ADMIN PANEL -->
<div id="adminPanel">

<h2>Admin Console</h2>

<div class="box">
  <h3>Subjects</h3>
  <input id="subjects" placeholder="Maths,Physics"><br>
  <button onclick="saveSubjects()">Save</button>
</div>

<div class="box">
  <h3>Attendance (%)</h3>
  <input id="attendance" type="number"><br>
  <button onclick="saveAttendance()">Save</button>
</div>

<div class="box">
  <h3>Timetable</h3>
  <select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
  </select>
  <input id="daySub" placeholder="Subjects"><br>
  <button onclick="saveTT()">Add / Update</button>
</div>

<div class="box">
  <h3>Notice</h3>
  <textarea id="notice" placeholder="Enter notice"></textarea><br>
  <button onclick="saveNotice()">Post</button>
</div>

<center>
<button onclick="goDashboard()">Back to Dashboard</button>
<button onclick="logout()">Logout</button>
</center>

</div>

<script>

// 🔐 AUTO CHECK (if already admin)
if(sessionStorage.getItem("role")==="admin"){
  showAdmin();
}

// 🔐 ADMIN LOGIN
function adminLogin(){
  let u = adminUser.value;
  let p = adminPass.value;

  if(u==="admin" && p==="admin123"){
    sessionStorage.setItem("role","admin");
    showAdmin();
  } else {
    alert("Invalid Admin Login");
  }
}

// SHOW PANEL
function showAdmin(){
  loginBox.style.display = "none";
  adminPanel.style.display = "block";
}

// SAVE DATA
function saveSubjects(){
  localStorage.setItem("subjects", JSON.stringify(subjects.value.split(",")));
  alert("Subjects Saved");
}

function saveAttendance(){
  localStorage.setItem("attendance", attendance.value);
  alert("Attendance Saved");
}

function saveTT(){
  let tt = JSON.parse(localStorage.getItem("timetable")) || {};
  tt[day.value] = daySub.value;
  localStorage.setItem("timetable", JSON.stringify(tt));
  alert("Timetable Updated");
}

function saveNotice(){
  localStorage.setItem("notice", notice.value);
  alert("Notice Posted");
}

// NAVIGATION
function goDashboard(){
  window.location.href = "dashboard.html";
}

// LOGOUT
function logout(){
  sessionStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
