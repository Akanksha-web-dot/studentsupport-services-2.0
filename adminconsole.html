<!DOCTYPE html>
<html>
<head>
<title>Admin Console</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.78);
    min-height: 100vh;
    padding: 20px;
}

.box {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    margin: 20px auto;
    width: 50%;
    border-radius: 12px;
    text-align: center;
}

h2 { text-align: center; }
</style>

</head>

<body>

<div class="overlay">

<!-- 🔐 LOGIN BOX -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 🧑‍💼 ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<h2>Admin Console</h2>

<div class="box">
  <h3>Subjects</h3>
  <input id="subjects"><br>
  <button onclick="saveSubjects()">Save</button>
</div>

<div class="box">
  <h3>Attendance</h3>
  <input id="attendance"><br>
  <button onclick="saveAttendance()">Save</button>
</div>

<div class="box">
  <h3>Timetable</h3>
  <select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
  </select>
  <input id="daySub"><br>
  <button onclick="saveTT()">Save</button>
</div>

<div class="box">
  <h3>Notice</h3>
  <textarea id="notice"></textarea><br>
  <button onclick="saveNotice()">Post</button>
</div>

<div class="box">
  <h3>Student Suggestions</h3>
  <ul id="list"></ul>
</div>

<center>
<button onclick="goBack()">Back</button>
<button onclick="logout()">Logout</button>
</center>

</div>

</div>

<script>

// ✅ AUTO LOGIN CHECK
if(sessionStorage.getItem("role") === "admin"){
  showAdmin();
}

// 🔐 LOGIN FUNCTION
function login(){
  let u = user.value;
  let p = pass.value;

  if(u==="admin" && p==="admin123"){
    sessionStorage.setItem("role","admin");
    sessionStorage.setItem("loggedIn","true");
    showAdmin();
  } else {
    alert("Invalid Login");
  }
}

// SHOW ADMIN PANEL
function showAdmin(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "block";
  loadSuggestions();
}

// 🔓 LOGOUT
function logout(){
  sessionStorage.clear();
  location.reload(); // 🔥 IMPORTANT FIX
}

// SAVE FUNCTIONS
function saveSubjects(){
  localStorage.setItem("subjects", JSON.stringify(subjects.value.split(",")));
}
function saveAttendance(){
  localStorage.setItem("attendance", attendance.value);
}
function saveTT(){
  let tt = JSON.parse(localStorage.getItem("timetable")) || {};
  tt[day.value] = daySub.value;
  localStorage.setItem("timetable", JSON.stringify(tt));
}
function saveNotice(){
  localStorage.setItem("notice", notice.value);
}

// LOAD SUGGESTIONS
function loadSuggestions(){
  let arr = JSON.parse(localStorage.getItem("suggestions")) || [];
  let ul = document.getElementById("list");
  ul.innerHTML = "";

  if(arr.length === 0){
    ul.innerHTML = "<li>No Suggestions</li>";
  } else {
    arr.forEach(s=>{
      let li=document.createElement("li");
      li.innerText=s;
      ul.appendChild(li);
    });
  }
}

// NAVIGATION
function goBack(){
  window.location.href="dashboard.html";
}

</script>

</body>
</html>
