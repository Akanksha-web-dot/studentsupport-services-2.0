<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Console</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.box{
    width:320px;
    margin:100px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    margin:10px;
    border-radius:10px;
}

input, textarea{
    width:95%;
    padding:8px;
    margin:5px 0;
}

button{
    padding:8px;
    background:#2c7be5;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Admin Login</h2>

<input type="text" id="id" placeholder="Admin ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="err" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel" class="overlay" style="display:none;">

<h2>ADMIN CONSOLE</h2>

<!-- ATTENDANCE -->
<div class="card">
<h3>Attendance</h3>
<input type="number" id="att">
<button onclick="saveAtt()">Save</button>
</div>

<!-- SUBJECTS -->
<div class="card">
<h3>Subjects</h3>
<input type="text" id="sub">
<button onclick="addSub()">Add</button>
</div>

<!-- TIMETABLE -->
<div class="card">
<h3>Timetable</h3>
<input type="text" id="day">
<input type="text" id="t">
<button onclick="addTT()">Add</button>
</div>

<!-- 🆕 NOTICE BOARD -->
<div class="card">
<h3>Post Notice</h3>
<textarea id="noticeText" placeholder="Write notice..."></textarea>
<button onclick="addNotice()">Publish</button>
</div>

<!-- 🆕 VIEW SUGGESTIONS -->
<div class="card">
<h3>Student Suggestions</h3>
<div id="sugBox"></div>
</div>

</div>

<script>

/// LOGIN
function login(){
    let id=document.getElementById("id").value;
    let pass=document.getElementById("pass").value;

    if(id==="admin@alliance.edu.in" && pass!==""){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="block";
        loadSuggestions();
    } else {
        document.getElementById("err").innerText="Invalid Login";
    }
}

/// ATTENDANCE
function saveAtt(){
    localStorage.setItem("attendance",document.getElementById("att").value);
}

/// SUBJECTS
function addSub(){
    let s=document.getElementById("sub").value;
    let arr=JSON.parse(localStorage.getItem("subjects"))||[];
    arr.push(s);
    localStorage.setItem("subjects",JSON.stringify(arr));
}

/// TIMETABLE
function addTT(){
    let d=document.getElementById("day").value;
    let t=document.getElementById("t").value;

    let tt=JSON.parse(localStorage.getItem("timetable"))||{};
    tt[d]=t;

    localStorage.setItem("timetable",JSON.stringify(tt));
}

/// 🆕 NOTICE SYSTEM
function addNotice(){
    let n=document.getElementById("noticeText").value;

    let arr=JSON.parse(localStorage.getItem("notices"))||[];
    arr.push(n);

    localStorage.setItem("notices",JSON.stringify(arr));

    document.getElementById("noticeText").value="";
}

/// 🆕 SUGGESTIONS VIEW
function loadSuggestions(){
    let s=JSON.parse(localStorage.getItem("suggestions"))||[];
    document.getElementById("sugBox").innerHTML =
    s.length ? s.map(x=>`<div class="card">${x}</div>`).join("")
             : "<p>No suggestions</p>";
}

</script>

</body>
</html>
