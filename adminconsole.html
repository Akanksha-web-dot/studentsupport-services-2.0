<!DOCTYPE html>
<html>
<head>
<title>Admin Console</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.78);
    min-height: 100vh;
    padding: 20px;
}

h2 {
    text-align: center;
}

.box {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    margin: 20px auto;
    width: 50%;
    border-radius: 12px;
    text-align: center;
    box-shadow: 2px 2px 10px #000;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="overlay">

<h2>Admin Console</h2>

<script>
// 🔐 ADMIN PROTECTION
if(sessionStorage.getItem("role") !== "admin"){
    alert("Access Denied");
    window.location.href = "dashboard.html";
}
</script>

<!-- SUBJECTS -->
<div class="box">
  <h3>Subjects</h3>
  <input id="subjects" placeholder="Maths,Physics"><br>
  <button onclick="saveSubjects()">Save</button>
</div>

<!-- ATTENDANCE -->
<div class="box">
  <h3>Attendance</h3>
  <input id="attendance" type="number"><br>
  <button onclick="saveAttendance()">Save</button>
</div>

<!-- TIMETABLE -->
<div class="box">
  <h3>Timetable</h3>
  <select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
  </select>
  <input id="daySub" placeholder="Subjects"><br>
  <button onclick="saveTimetable()">Save</button>
</div>

<!-- NOTICE -->
<div class="box">
  <h3>Notice</h3>
  <textarea id="notice" placeholder="Enter notice"></textarea><br>
  <button onclick="saveNotice()">Post</button>
</div>

<!-- 💬 SUGGESTIONS FROM STUDENTS -->
<div class="box">
  <h3>Student Suggestions</h3>
  <ul id="suggestionList"></ul>
</div>

<center>
<button onclick="goDashboard()">Back to Dashboard</button>
<button onclick="logout()">Logout</button>
</center>

</div>

<script>

// 📊 SAVE FUNCTIONS
function saveSubjects(){
  let subs = document.getElementById("subjects").value.split(",");
  localStorage.setItem("subjects", JSON.stringify(subs));
  alert("Subjects Saved");
}

function saveAttendance(){
  localStorage.setItem("attendance", document.getElementById("attendance").value);
  alert("Attendance Saved");
}

function saveTimetable(){
  let tt = JSON.parse(localStorage.getItem("timetable")) || {};
  let day = document.getElementById("day").value;
  let sub = document.getElementById("daySub").value;

  tt[day] = sub;
  localStorage.setItem("timetable", JSON.stringify(tt));
  alert("Timetable Saved");
}

function saveNotice(){
  localStorage.setItem("notice", document.getElementById("notice").value);
  alert("Notice Posted");
}

// 💬 LOAD SUGGESTIONS (LINKED WITH ACADEMICS)
function loadSuggestions(){
  let list = document.getElementById("suggestionList");
  let suggestions = JSON.parse(localStorage.getItem("suggestions")) || [];

  list.innerHTML = "";

  if(suggestions.length === 0){
    list.innerHTML = "<li>No Suggestions Yet</li>";
  } else {
    suggestions.forEach((s, index) => {
      let li = document.createElement("li");
      li.innerText = s;
      list.appendChild(li);
    });
  }
}

// CALL ON LOAD
loadSuggestions();

// 🔗 NAVIGATION
function goDashboard(){
  window.location.href = "dashboard.html";
}

// 🔓 LOGOUT
function logout(){
  sessionStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
