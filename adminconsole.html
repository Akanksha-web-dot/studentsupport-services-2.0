<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("ADMIN BLOCK (1).webp") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* COMMON */
.overlay {
    background: rgba(0,0,0,0.8);
    min-height: 100vh;
    padding: 20px;
}

/* LOGIN BOX */
#loginBox {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.login-btn {
    background: blue;
    color: white;
}

.logout-btn {
    background: red;
    color: white;
}

.card {
    background: rgba(255,255,255,0.12);
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="box">
        <h2>Admin Login</h2>

        <input type="text" id="id" placeholder="Admin ID">
        <input type="password" id="pass" placeholder="Password">

        <button class="login-btn" onclick="login()">Login</button>

        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="overlay" style="display:none;">

<h1>ADMIN CONSOLE</h1>

<button class="logout-btn" onclick="logout()">Logout</button>
<button onclick="location.href='dashboard.html'">Back</button>

<div id="list"></div>

</div>

<script>

// CHECK SESSION ON LOAD
if (sessionStorage.getItem("adminLoggedIn") === "true") {
    showAdmin();
}

// LOGIN FUNCTION
function login() {
    let id = document.getElementById("id").value.trim();
    let pass = document.getElementById("pass").value.trim();

    if (id === "admin@alliance.edu.in" && pass === "Admin@123") {
        sessionStorage.setItem("adminLoggedIn", "true");
        showAdmin();
    } else {
        document.getElementById("error").innerText = "Invalid credentials";
    }
}

// SHOW ADMIN PANEL
function showAdmin() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadSuggestions();
}

// LOAD SUGGESTIONS
function loadSuggestions() {
    let data = JSON.parse(localStorage.getItem("suggestions") || "[]");
    let list = document.getElementById("list");

    list.innerHTML = "";

    if (data.length === 0) {
        list.innerHTML = "<div class='card'>No suggestions yet</div>";
        return;
    }

    data.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <p><b>Suggestion ${index + 1}</b></p>
            <p>${item}</p>
            <button onclick="deleteItem(${index})">Delete</button>
        `;

        list.appendChild(div);
    });
}

// DELETE
function deleteItem(index) {
    let data = JSON.parse(localStorage.getItem("suggestions") || "[]");
    data.splice(index, 1);
    localStorage.setItem("suggestions", JSON.stringify(data));
    loadSuggestions();
}

// LOGOUT
function logout() {
    sessionStorage.removeItem("adminLoggedIn");
    location.reload();
}

</script>

</body>
</html>
